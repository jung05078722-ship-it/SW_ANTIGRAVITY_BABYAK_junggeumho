<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>밥약 (Babyak) - 우리 학교 밥친구 매칭</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ==========================================================================
       Design System & Variables
       ========================================================================== */
    :root {
      --primary-color: #FF6B4A;
      --primary-hover: #E85A3A;
      --primary-light: #FFEDE9;
      --primary-gradient: linear-gradient(135deg, #FF8E53 0%, #FF5E62 100%);
      --secondary-color: #FFB347;
      
      --bg-color: #F9FAFB;
      --card-bg: #FFFFFF;
      --text-main: #1F2937;
      --text-muted: #6B7280;
      --text-light: #9CA3AF;
      --border-color: #E5E7EB;
      
      --success: #10B981;
      --success-light: #D1FAE5;
      --danger: #EF4444;
      --danger-light: #FEE2E2;
      
      --font-main: 'Noto Sans KR', 'Inter', sans-serif;
      --font-logo: 'Outfit', sans-serif;
      
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 10px 15px -3px rgba(255, 107, 74, 0.15), 0 4px 6px -2px rgba(255, 107, 74, 0.05);
      
      --transition-fast: 0.2s ease;
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: var(--font-main);
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: #121214;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4px;
    }

    /* Desktop Wrapper & Phone Simulator */
    .desktop-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;
      background: radial-gradient(circle at 10% 20%, rgb(43, 44, 49) 0%, rgb(18, 18, 20) 90.1%);
    }

    .phone-container {
      width: 100%;
      max-width: 430px;
      height: 100%;
      max-height: 900px;
      background-color: var(--bg-color);
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      border-radius: 40px;
      border: 10px solid #2B2C31;
    }

    @media (max-width: 480px) {
      .phone-container {
        max-width: 100%;
        max-height: 100%;
        border-radius: 0;
        border: none;
      }
      .phone-status-bar {
        display: none !important;
      }
    }

    .phone-status-bar {
      height: 38px;
      background-color: var(--bg-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 28px 0 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.2px;
      color: var(--text-main);
      z-index: 100;
      user-select: none;
    }

    .phone-status-bar .status-icons {
      display: flex;
      gap: 6px;
      font-size: 11px;
    }

    .app-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
      padding-bottom: 70px;
    }

    .app-content.no-nav {
      padding-bottom: 0 !important;
    }

    /* Bottom Navigation Bar */
    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 68px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(229, 231, 235, 0.7);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      align-items: center;
      justify-items: center;
      z-index: 99;
      padding-bottom: var(--safe-area-bottom);
    }

    .bottom-nav.hidden {
      display: none !important;
    }

    .nav-item {
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: var(--text-muted);
      cursor: pointer;
      width: 100%;
      height: 100%;
      font-size: 10px;
      font-weight: 500;
      transition: var(--transition-fast);
    }

    .nav-item i {
      font-size: 20px;
      transition: transform var(--transition-fast);
    }

    .nav-item:hover i, .nav-item.active i {
      transform: translateY(-2px);
    }

    .nav-item.active {
      color: var(--primary-color);
      font-weight: 700;
    }

    .nav-icon-wrapper {
      position: relative;
      display: inline-block;
    }

    .badge {
      position: absolute;
      top: -4px;
      right: -8px;
      background-color: var(--danger);
      color: white;
      font-size: 9px;
      font-weight: 700;
      border-radius: 10px;
      padding: 1px 5px;
      min-width: 14px;
      text-align: center;
      border: 1.5px solid white;
      animation: popIn 0.3s ease;
    }

    .badge.hidden {
      display: none !important;
    }

    /* Core UI Elements */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: all var(--transition-fast);
    }

    .btn-primary {
      background: var(--primary-gradient);
      color: white;
      box-shadow: var(--shadow-lg);
    }

    .btn-primary:active {
      transform: scale(0.98);
      opacity: 0.95;
    }

    .btn-primary:disabled {
      background: var(--text-light);
      box-shadow: none;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-secondary {
      background-color: var(--primary-light);
      color: var(--primary-color);
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-main);
    }

    .form-group {
      margin-bottom: 18px;
      width: 100%;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-field {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-main);
      background-color: white;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.15);
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    .animate-fade-in { animation: fadeIn 0.3s ease forwards; }
    .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    .hidden { display: none !important; }

    /* Splash Screen */
    .splash-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--primary-gradient);
      color: white;
      padding: 24px;
      height: 100%;
    }

    .splash-logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 80px;
    }

    .splash-logo-circle {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 26px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      animation: pulse 2s infinite ease-in-out;
    }

    .splash-logo-circle i {
      font-size: 42px;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .splash-title {
      font-family: var(--font-logo);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .splash-subtitle {
      font-size: 15px;
      font-weight: 400;
      opacity: 0.9;
      text-align: center;
      line-height: 1.4;
    }

    .splash-footer {
      font-size: 11px;
      opacity: 0.6;
      position: absolute;
      bottom: 30px;
    }

    /* Auth Screen */
    .auth-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 30px 24px;
      background-color: var(--bg-color);
      min-height: 100%;
    }

    .auth-header {
      margin-bottom: 28px;
    }

    .auth-back-btn {
      border: none;
      background: none;
      font-size: 20px;
      color: var(--text-main);
      cursor: pointer;
      margin-bottom: 16px;
      padding: 4px;
    }

    .auth-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    .auth-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .code-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin: 20px 0;
    }

    .code-input {
      height: 56px;
      border: 1.5px solid var(--border-color);
      border-radius: 12px;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      background-color: white;
    }

    .code-input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.15);
    }

    .tags-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .tags-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .tag-checkbox {
      display: none;
    }

    .tag-label {
      padding: 8px 14px;
      background-color: white;
      border: 1px solid var(--border-color);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .tag-checkbox:checked + .tag-label {
      background-color: var(--primary-light);
      border-color: var(--primary-color);
      color: var(--primary-color);
      font-weight: 600;
    }

    /* Feed Screen */
    .header-bar {
      position: sticky;
      top: 0;
      height: 56px;
      background-color: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      z-index: 90;
    }

    .header-logo {
      font-family: var(--font-logo);
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-color);
      letter-spacing: 0.5px;
    }

    .header-logo i { margin-right: 4px; }

    .header-action {
      border: none;
      background: none;
      font-size: 18px;
      color: var(--text-main);
      cursor: pointer;
      position: relative;
    }

    .filter-bar {
      background-color: white;
      padding: 10px 16px 14px 16px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 56px;
      z-index: 89;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      padding: 7px 12px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-chip.active {
      background-color: var(--text-main);
      border-color: var(--text-main);
      color: white;
    }

    .feed-container {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .card {
      background-color: var(--card-bg);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0, 0, 0, 0.02);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:active {
      transform: scale(0.99);
      box-shadow: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.3;
    }

    .card-status {
      padding: 3px 8px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 700;
    }

    .card-status.recruiting {
      background-color: var(--primary-light);
      color: var(--primary-color);
    }

    .card-status.closed {
      background-color: var(--border-color);
      color: var(--text-muted);
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-detail-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12.5px;
      color: var(--text-muted);
    }

    .card-detail-item i {
      color: var(--primary-color);
      width: 14px;
      text-align: center;
    }

    .card-footer {
      border-top: 1px solid var(--border-color);
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-user-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background-color: var(--primary-light);
      color: var(--primary-color);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 700;
      font-size: 12px;
      border: 1px solid var(--border-color);
    }

    .user-nickname { font-size: 12px; font-weight: 600; }
    .user-manner {
      font-size: 10px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 2px;
    }
    .user-manner i { color: var(--secondary-color); }
    .card-capacity { font-size: 12px; font-weight: 700; color: var(--primary-color); }

    .fab {
      position: absolute;
      bottom: 84px;
      right: 20px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--primary-gradient);
      color: white;
      border: none;
      box-shadow: 0 6px 16px rgba(255, 107, 74, 0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      cursor: pointer;
      z-index: 80;
    }

    .fab:active { transform: scale(0.92); }

    .empty-state {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 80px 20px;
    }
    .empty-state i { font-size: 40px; color: var(--text-light); }
    .empty-state p { font-size: 14px; }

    /* Write Post Screen */
    .write-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-color);
    }

    .write-header {
      position: sticky;
      top: 0;
      height: 56px;
      background-color: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 90;
    }

    .write-back-btn {
      border: none;
      background: none;
      font-size: 18px;
      color: var(--text-main);
      cursor: pointer;
    }

    .write-title { font-size: 16px; font-weight: 700; }
    .write-save-btn {
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-color);
      cursor: pointer;
    }

    .write-form {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .segmented-control {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      background-color: var(--border-color);
      padding: 3px;
      border-radius: 10px;
      gap: 2px;
    }

    .segmented-btn {
      border: none;
      background: none;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
    }

    .segmented-btn.active {
      background-color: white;
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
    }

    .options-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .option-btn {
      background-color: white;
      border: 1px solid var(--border-color);
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .option-btn.active {
      border-color: var(--primary-color);
      background-color: var(--primary-light);
      color: var(--primary-color);
      font-weight: 600;
    }

    /* Detail Screen */
    .detail-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-color);
    }

    .detail-header {
      height: 56px;
      background-color: white;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky;
      top: 0;
      z-index: 90;
    }

    .detail-body {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
    }

    .detail-card {
      background-color: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .detail-user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 14px;
    }

    .detail-user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .detail-user-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .detail-user-meta { font-size: 11px; color: var(--text-muted); }
    .detail-title { font-size: 18px; font-weight: 700; line-height: 1.3; }

    .detail-info-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-info-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13.5px;
    }

    .detail-info-item i {
      color: var(--primary-color);
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .detail-info-label { font-weight: 600; color: var(--text-muted); width: 60px; }
    .detail-info-value { color: var(--text-main); font-weight: 500; }

    .detail-participants-section {
      background-color: white;
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text-main);
      display: flex;
      justify-content: space-between;
    }

    .participants-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .participant-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .participant-avatar-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .participant-badge {
      font-size: 10px;
      background-color: var(--primary-light);
      color: var(--primary-color);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .detail-footer-btn-container {
      margin-top: auto;
      padding: 16px 20px;
      background-color: white;
      border-top: 1px solid var(--border-color);
      position: sticky;
      bottom: 0;
      z-index: 80;
    }

    /* Notifications Screen */
    .noti-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      background-color: var(--bg-color);
    }

    .noti-list {
      display: flex;

<body>

  <!-- Javascript Logic -->
  <script>
    // ==========================================================================
    // 1. Data Store / State Machine
    // ==========================================================================
    const STATE_KEY = 'BABYAK_APP_STATE';
    
    const MOCK_USERS = [
      { id: 'user_minsoo', nickname: '민수킴', email: 'minsoo@univ.ac.kr', dept: '컴퓨터공학과', grade: '2학년', tags: ['한식', '가성비', '빠른식사'], mannerScore: 38.5, avatar: 'M' },
      { id: 'user_yoonji', nickname: '윤지츄', email: 'yoonji@univ.ac.kr', dept: '경영학과', grade: '1학년', tags: ['일식', '수다왕', '디저트'], mannerScore: 36.5, avatar: 'Y' },
      { id: 'user_jihoon', nickname: '지훈보이', email: 'jihoon@univ.ac.kr', dept: '음악학과', grade: '3학년', tags: ['양식', '마라탕', '맛집탐방'], mannerScore: 41.2, avatar: 'J' }
    ];

    const getMockPosts = () => [
      { id: 'post_1', title: '오늘 점심 학식 같이 먹을 분!', menu: '제육볶음', dateTime: new Date().toISOString().slice(0,11) + '12:30', location: '학생식당', capacity: 3, joinedCount: 1, genderCondition: '무관', status: 'recruiting', authorId: 'user_yoonji', participantIds: ['user_yoonji'], createdAt: new Date().toISOString() },
      { id: 'post_2', title: '신촌 마라탕 팟 구합니다 (혼밥 탈출)', menu: '마라탕', dateTime: new Date().toISOString().slice(0,11) + '18:00', location: '대학가 마라탕집', capacity: 4, joinedCount: 2, genderCondition: '동성만', status: 'recruiting', authorId: 'user_jihoon', participantIds: ['user_jihoon', 'user_minsoo'], createdAt: new Date().toISOString() }
    ];

    const getMockChats = () => [
      {
        id: 'post_2',
        postId: 'post_2',
        participantIds: ['user_jihoon', 'user_minsoo'],
        ended: false,
        messages: [
          { id: 'msg_1', senderId: 'system', senderName: '시스템', content: '밥약 매칭이 성사되어 채팅방이 개설되었습니다!', timestamp: '2026-06-19T20:00:00Z', isSystem: true },
          { id: 'msg_2', senderId: 'user_jihoon', senderName: '지훈보이', content: '안녕하세요! 마라탕 매운 단계 몇단계 드시나요?', timestamp: '2026-06-19T20:02:00Z', isSystem: false },
          { id: 'msg_3', senderId: 'user_minsoo', senderName: '민수킴', content: '안녕하세요~ 전 보통 2단계 먹어요 ㅎㅎ!', timestamp: '2026-06-19T20:05:00Z', isSystem: false }
        ]
      }
    ];

    const getMockApplications = () => [
      { id: 'app_1', postId: 'post_1', applicantId: 'user_minsoo', status: 'pending', createdAt: new Date().toISOString() }
    ];

    let state = { users: [...MOCK_USERS], posts: [], applications: [], chats: [], currentUser: null };

    function initializeState() {
      const savedState = localStorage.getItem(STATE_KEY);
      if (savedState) {
        try {
          state = JSON.parse(savedState);
          if (!state.users || state.users.length === 0) state.users = [...MOCK_USERS];
        } catch (e) {
          resetState();
        }
      } else {
        resetState();
      }
      return state;
    }

    function resetState() {
      state.users = [...MOCK_USERS];
      state.posts = getMockPosts();
      state.applications = getMockApplications();
      state.chats = getMockChats();
      state.currentUser = state.users[0];
      saveState();
    }

    function saveState() {
      localStorage.setItem(STATE_KEY, JSON.stringify(state));
    }

    const db = {
      getCurrentUser: () => state.currentUser,
      setCurrentUser: (userId) => {
        const u = state.users.find(x => x.id === userId);
        if (u) { state.currentUser = u; saveState(); return u; }
        return null;
      },
      registerUser: (data) => {
        const newUser = {
          id: 'user_' + Date.now(), nickname: data.nickname, email: data.email, dept: data.dept, grade: data.grade, tags: data.tags || [], mannerScore: 36.5, avatar: data.nickname.charAt(0).toUpperCase()
        };
        state.users.push(newUser);
        state.currentUser = newUser;
        saveState();
        return newUser;
      },
      getUsers: () => state.users,
      getUser: (id) => state.users.find(x => x.id === id),
      getPosts: () => state.posts,
      getPost: (id) => state.posts.find(x => x.id === id),
      createPost: (data) => {
        const newPost = {
          id: 'post_' + Date.now(), title: data.title, menu: data.menu, dateTime: data.dateTime, location: data.location, capacity: parseInt(data.capacity, 10), joinedCount: 1, genderCondition: data.genderCondition, status: 'recruiting', authorId: state.currentUser.id, participantIds: [state.currentUser.id], createdAt: new Date().toISOString()
        };
        state.posts.unshift(newPost);
        saveState();
        return newPost;
      },
      getApplications: () => state.applications,
      applyToPost: (postId) => {
        const user = state.currentUser;
        const post = db.getPost(postId);
        if (post.authorId === user.id) return { success: false, message: '본인이 쓴 글에는 신청할 수 없습니다.' };
        if (post.participantIds.includes(user.id)) return { success: false, message: '이미 참여 중인 밥약입니다.' };
        
        if (post.genderCondition === '동성만') {
          const author = db.getUser(post.authorId);
          const isMale = (u) => u.id === 'user_minsoo' || u.id === 'user_jihoon';
          if (isMale(author) !== isMale(user)) return { success: false, message: '성별 조건(동성만)에 맞지 않습니다.' };
        }

        const existing = state.applications.find(a => a.postId === postId && a.applicantId === user.id);
        if (existing) {
          if (existing.status === 'pending') return { success: false, message: '이미 수락 대기 중인 신청입니다.' };
          return { success: false, message: '이미 참여 신청 정보를 보냈습니다.' };
        }

        const newApp = { id: 'app_' + Date.now(), postId, applicantId: user.id, status: 'pending', createdAt: new Date().toISOString() };
        state.applications.push(newApp);
        saveState();
        return { success: true, application: newApp };
      },
      respondToApplication: (appId, status) => {
        const app = state.applications.find(a => a.id === appId);
        if (!app) return { success: false };
        app.status = status;
        
        if (status === 'accepted') {
          const post = db.getPost(app.postId);
          if (post.joinedCount >= post.capacity) {
            app.status = 'pending';
            return { success: false, message: '이미 정원이 마감되었습니다.' };
          }
          post.participantIds.push(app.applicantId);
          post.joinedCount = post.participantIds.length;
          if (post.joinedCount >= post.capacity) post.status = 'closed';

          // Sync chat room
          let chat = state.chats.find(c => c.postId === post.id);
          if (!chat) {
            chat = {
              id: post.id, postId: post.id, participantIds: [...post.participantIds], ended: false,
              messages: [{ id: 'msg_sys_' + Date.now(), senderId: 'system', senderName: '시스템', content: '밥약 매칭이 성사되어 채팅방이 개설되었습니다!', timestamp: new Date().toISOString(), isSystem: true }]
            };
            state.chats.push(chat);
          } else {
            chat.participantIds = [...post.participantIds];
            chat.messages.push({ id: 'msg_sys_' + Date.now(), senderId: 'system', senderName: '시스템', content: `${db.getUser(app.applicantId).nickname}님이 합류하셨습니다.`, timestamp: new Date().toISOString(), isSystem: true });
          }
        }
        saveState();
        return { success: true };
      },
      getChats: () => {
        const u = state.currentUser;
        if (!u) return [];
        return state.chats.filter(c => c.participantIds.includes(u.id));
      },
      getChat: (id) => state.chats.find(c => c.id === id),
      sendChatMessage: (chatId, content) => {
        const u = state.currentUser;
        const chat = db.getChat(chatId);
        if (!chat || chat.ended) return null;
        const newMsg = { id: 'msg_' + Date.now(), senderId: u.id, senderName: u.nickname, content, timestamp: new Date().toISOString(), isSystem: false };
        chat.messages.push(newMsg);
        saveState();
        return newMsg;
      },
      endChatRoom: (chatId) => {
        const chat = db.getChat(chatId);
        if (!chat) return false;
        chat.ended = true;
        chat.messages.push({ id: 'msg_sys_' + Date.now(), senderId: 'system', senderName: '시스템', content: '식사가 마쳐져 채팅방이 종료되었습니다. 멤버들의 리뷰를 남겨주세요!', timestamp: new Date().toISOString(), isSystem: true });
        const post = db.getPost(chat.postId);
        if (post) post.status = 'closed';
        saveState();
        return true;
      },
      rateParticipant: (postId, targetUserId, rating) => {
        const target = db.getUser(targetUserId);
        if (!target) return false;
        let diff = 0;
        if (rating === 5) diff = 0.5;
        else if (rating === 4) diff = 0.2;
        else if (rating === 2) diff = -0.2;
        else if (rating === 1) diff = -0.5;
        
        target.mannerScore = Math.max(0, Math.min(99.0, parseFloat((target.mannerScore + diff).toFixed(1))));
        saveState();
        return true;
      }
    };

    // ==========================================================================
    // 2. Global Toast & Utility helpers
    // ==========================================================================
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      let icon = type === 'danger' ? 'fa-exclamation-circle' : (type === 'warning' ? 'fa-exclamation-triangle' : 'fa-check-circle');
      toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translate(-50%, -20px)';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    function showModal(content) {
      const overlay = document.getElementById('modal-container');
      overlay.innerHTML = content;
      overlay.classList.remove('hidden');
    }

    function hideModal() {
      const overlay = document.getElementById('modal-container');
      overlay.classList.add('hidden');
      overlay.innerHTML = '';
    }

    function formatDateTime(dateTimeStr) {
      const d = new Date(dateTimeStr);
      const m = d.getMonth() + 1;
      const date = d.getDate();
      const h = d.getHours().toString().padStart(2, '0');
      const min = d.getMinutes().toString().padStart(2, '0');
      const week = ['일', '월', '화', '수', '목', '금', '토'];
      const day = week[d.getDay()];
      
      const today = new Date().toDateString();
      const tom = new Date();
      tom.setDate(tom.getDate() + 1);
      const tomorrow = tom.toDateString();
      
      let prefix = `${m}/${date}(${day})`;
      if (d.toDateString() === today) prefix = '오늘';
      else if (d.toDateString() === tomorrow) prefix = '내일';
      return `${prefix} ${h}:${min}`;
    }

    function getAvatarHtml(user) {
      return `<div class="user-avatar">${user.avatar}</div>`;
    }

      chatRoom: (container, chatId, navigate) => {
        const chat = db.getChat(chatId);
        if (!chat) { container.innerHTML = `<div class="auth-screen">방을 찾을 수 없습니다.</div>`; return; }
        
        const currentUser = db.getCurrentUser();
        const post = db.getPost(chat.postId);
        
        container.innerHTML = `
          <div class="chat-room-screen animate-fade-in">
            <div class="chat-room-header">
              <button class="chat-back-btn" id="btn-cr-back"><i class="fas fa-arrow-left"></i></button>
              <div class="chat-room-title-container"><span class="chat-room-title">${post.menu} 밥약</span><span class="chat-room-member-count">${chat.participantIds.length}명 대화중</span></div>
              <div style="width:24px;"></div>
            </div>
            <div class="chat-room-info-banner">
              <div class="chat-banner-details"><span><i class="far fa-clock"></i> ${formatDateTime(post.dateTime)}</span><span><i class="fas fa-map-marker-alt"></i> ${post.location}</span></div>
              ${!chat.ended ? `<button class="chat-end-btn" id="btn-cr-end">식사 완료</button>` : `<span style="font-size:11px;color:var(--text-light);">식사 및 대화 종료됨</span>`}
            </div>
            <div class="chat-messages-container" id="cr-msgs"></div>
            <div class="chat-input-bar">
              <input type="text" class="chat-input" id="cr-input" placeholder="메시지를 입력하세요..." ${chat.ended?'disabled':''}>
              <button class="chat-send-btn" id="btn-cr-send" ${chat.ended?'disabled':''}><i class="fas fa-paper-plane"></i></button>
            </div>
          </div>
        `;
        
        const box = document.getElementById('cr-msgs');
        const inp = document.getElementById('cr-input');
        
        function scroll() { box.scrollTop = box.scrollHeight; }
        
        function drawMsgs() {
          box.innerHTML = chat.messages.map(m => {
            if (m.isSystem) return `<div class="chat-sys-msg">${m.content}</div>`;
            const isMe = m.senderId === currentUser.id;
            const sender = db.getUser(m.senderId) || { nickname: m.senderName };
            const time = new Date(m.timestamp).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
            
            return `
              <div class="chat-msg-bubble-group ${isMe?'me':'other'}">
                ${!isMe ? getAvatarHtml(sender) : ''}
                <div class="chat-bubble-content-wrapper">
                  ${!isMe ? `<span class="chat-bubble-sender">${sender.nickname}</span>` : ''}
                  <div class="chat-bubble-row">
                    <div class="chat-bubble">${m.content}</div>
                    <span class="chat-bubble-time">${time}</span>
                  </div>
                </div>
              </div>
            `;
          }).join('');
          scroll();
        }
        
        function send() {
          const txt = inp.value.trim();
          if (!txt) return;
          const sent = db.sendChatMessage(chat.id, txt);
          if (sent) {
            inp.value = '';
            drawMsgs();
            
            if (chat.participantIds.length > 1) {
              setTimeout(() => {
                const others = chat.participantIds.filter(x => x !== currentUser.id);
                const responderId = others[Math.floor(Math.random()*others.length)];
                const responder = db.getUser(responderId);
                const answers = ['좋습니다! 시간 맞춰 뵙겠습니다~', '저도 지금 출발해요!', '이따 뵙겠습니다 ㅎㅎ', '맛있겠네요 🤤'];
                
                chat.messages.push({
                  id: 'msg_sim_' + Date.now(), senderId: responder.id, senderName: responder.nickname, content: answers[Math.floor(Math.random()*answers.length)], timestamp: new Date().toISOString(), isSystem: false
                });
                db.saveState();
                
                const targetBox = document.getElementById('cr-msgs');
                if (targetBox) drawMsgs();
                showToast(`${responder.nickname}: ${chat.messages[chat.messages.length-1].content}`, 'success');
              }, 2500);
            }
          }
        }
        
        document.getElementById('btn-cr-back').addEventListener('click', () => navigate('chats'));
        document.getElementById('btn-cr-send').addEventListener('click', send);
        inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
        
        if (!chat.ended) {
          document.getElementById('btn-cr-end').addEventListener('click', () => {
            const others = chat.participantIds.filter(x => x !== currentUser.id).map(x => db.getUser(x));
            if (others.length === 0) {
              db.endChatRoom(chat.id);
              showToast('식사가 종료되었습니다.', 'success');
              navigate('chats');
              return;
            }
            
            let idx = 0, score = 5;
            function review() {
              const u = others[idx];
              showModal(`
                <div class="modal-content">
                  <h3 class="modal-title">매너 평점 남기기</h3>
                  <p class="modal-desc"><strong>${u.nickname}</strong>님과의 식사 매너는 어땠나요?</p>
                  <div class="rating-stars">
                    <button class="star-btn selected" data-val="1"><i class="fas fa-star"></i></button>
                    <button class="star-btn selected" data-val="2"><i class="fas fa-star"></i></button>
                    <button class="star-btn selected" data-val="3"><i class="fas fa-star"></i></button>
                    <button class="star-btn selected" data-val="4"><i class="fas fa-star"></i></button>
                    <button class="star-btn selected" data-val="5"><i class="fas fa-star"></i></button>
                  </div>
                  <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn btn-outline" id="btn-m-skip" style="flex:1;">건너뛰기</button>
                    <button class="btn btn-primary" id="btn-m-ok" style="flex:1.5;">평가 완료</button>
                  </div>
                </div>
              `);
              
              const overlay = document.getElementById('modal-container');
              const stars = overlay.querySelectorAll('.star-btn');
              stars.forEach(s => {
                s.addEventListener('click', () => {
                  const val = parseInt(s.getAttribute('data-val'), 10);
                  score = val;
                  stars.forEach(st => {
                    const stVal = parseInt(st.getAttribute('data-val'), 10);
                    st.classList.toggle('selected', stVal <= val);
                  });
                });
              });
              
              document.getElementById('btn-m-ok').addEventListener('click', () => {
                db.rateParticipant(post.id, u.id, score);
                showToast(`${u.nickname}님에게 평점 ${score}점을 보냈습니다.`, 'success');
                next();
              });
              document.getElementById('btn-m-skip').addEventListener('click', next);
            }
            
            function next() {
              idx++;
              if (idx < others.length) {
                score = 5;
                review();
              } else {
                db.endChatRoom(chat.id);
                hideModal();
                showToast('평가가 완료되었습니다! 약속이 공식 종료되었습니다.', 'success');
                navigate('chats');
              }
            }
            review();
          });
        }
        
        drawMsgs();
      },

    // ==========================================================================
    // 4. Router & Navigation Controller
    // ==========================================================================
    let currentView = 'splash';
    const appContainer = document.getElementById('app');
    const bottomNav = document.getElementById('bottom-nav');

    function navigate(viewName, params = {}) {
      currentView = viewName;
      appContainer.className = 'app-content animate-fade-in';
      
      const hideNavViews = ['splash', 'auth', 'create-post', 'detail', 'chat-room'];
      if (hideNavViews.includes(viewName)) {
        bottomNav.classList.add('hidden');
        appContainer.classList.add('no-nav');
      } else {
        bottomNav.classList.remove('hidden');
        appContainer.classList.remove('no-nav');
        bottomNav.querySelectorAll('.nav-item').forEach(item => {
          item.classList.toggle('active', item.getAttribute('data-view') === viewName);
        });
      }
      
      switch (viewName) {
        case 'splash':
          render.splash(appContainer, () => {
            const user = db.getCurrentUser();
            navigate(user ? 'feed' : 'auth');
          });
          break;
        case 'auth':
          render.auth(appContainer, () => navigate('feed'));
          break;
        case 'feed':
          render.feed(appContainer, navigate);
          break;
        case 'create-post':
          render.createPost(appContainer, navigate);
          break;
        case 'detail':
          render.detail(appContainer, params.postId, navigate);
          break;
        case 'notifications':
          render.notifications(appContainer, navigate);
          break;
        case 'chats':
          render.chats(appContainer, navigate);
          break;
        case 'chat-room':
          render.chatRoom(appContainer, params.chatId, navigate);
          break;
        case 'mypage':
          render.mypage(appContainer, navigate, () => navigate('mypage'));
          break;
      }
      updateGlobalBadges();
    }

    function updateGlobalBadges() {
      const bell = document.getElementById('noti-badge');
      const chat = document.getElementById('chat-badge');
      const user = db.getCurrentUser();
      if (!user) return;
      
      const myWrittenIds = db.getPosts().filter(x => x.authorId === user.id).map(x => x.id);
      const pendingCount = db.getApplications().filter(a => myWrittenIds.includes(a.postId) && a.status === 'pending').length;
      bell.textContent = pendingCount;
      bell.classList.toggle('hidden', pendingCount === 0);
      
      const activeChats = db.getChats();
      const unread = activeChats.filter(c => !c.ended).length;
      chat.textContent = unread;
      chat.classList.toggle('hidden', unread === 0);
    }

    bottomNav.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => navigate(item.getAttribute('data-view')));
    });

    function updateClock() {
      const timeSpan = document.querySelector('.status-time');
      if (!timeSpan) return;
      const now = new Date();
      timeSpan.textContent = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      initializeState();
      updateClock();
      setInterval(updateClock, 1000);
      navigate('splash');
    });
  </script>
</body>
</html>
